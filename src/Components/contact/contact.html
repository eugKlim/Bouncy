<section class="contact" id="contact">
  <div class="container">
    <h2 class="contact-title">Contact Us</h2>
    <h3 class="contact-subtitle">
      At vero eos et accusamus et iusto odio dignissimos ducimus qui blanditiis
      praesentium
    </h3>

    <div class="contact-cards">
      <!-- 1 -->
      <div class="contact-card">
        <div class="contact-card__img">
          <picture class="lazy-picture">
            <source
              data-srcset="./media/image/contact/contact-email.avif"
              type="image/avif"
              srcset="./media/image/global-icons/1x1.png"
            />
            <source
              data-srcset="./media/image/contact/contact-email.webp"
              type="image/webp"
              srcset="./media/image/global-icons/1x1.png"
            />
            <img
              data-src="./media/image/contact/contact-email.jpg"
              src="./media/image/global-icons/1x1.png"
              alt="Email image"
            />
          </picture>
        </div>
        <address class="contact-card__info">
          <p class="contact-card__info-title">EMAIL</p>
          <a
            href="mailto:hello@codecafe.com"
            class="contact-card__info-email link"
            aria-label="link to email hello@codecafe.com"
            >hello@codecafe.com</a
          >
          <a
            href="mailto:Personal@codecafe.com"
            class="contact-card__info-email link"
            aria-label="link to email Personal@codecafe.com"
            >Personal@codecafe.com</a
          >
        </address>
      </div>
      <!-- 2 -->
      <div class="contact-card">
        <div class="contact-card__img">
          <picture class="lazy-picture">
            <source
              data-srcset="./media/image/contact/contact-address.avif"
              type="image/avif"
              srcset="./media/image/global-icons/1x1.png"
            />
            <source
              data-srcset="./media/image/contact/contact-address.webp"
              type="image/webp"
              srcset="./media/image/global-icons/1x1.png"
            />
            <img
              data-src="./media/image/contact/contact-address.jpg"
              src="./media/image/global-icons/1x1.png"
              alt="address image"
            />
          </picture>
        </div>
        <div class="contact-card__info">
          <p class="contact-card__info-title">OUR OFFICE</p>
          <p class="contact-card__info-address">240 Bhatikhana, 8200 Barisal</p>
          <p class="contact-card__info-address">Bangladesh</p>
        </div>
      </div>
      <!-- 3 -->
      <div class="contact-card">
        <div class="contact-card__img">
          <picture class="lazy-picture">
            <source
              data-srcset="./media/image/contact/contact-phone.avif"
              type="image/avif"
              srcset="./media/image/global-icons/1x1.png"
            />
            <source
              data-srcset="./media/image/contact/contact-phone.webp"
              type="image/webp"
              srcset="./media/image/global-icons/1x1.png"
            />
            <img
              data-src="./media/image/contact/contact-phone.jpg"
              src="./media/image/global-icons/1x1.png"
              alt="phone image"
            />
          </picture>
        </div>
        <div class="contact-card__info">
          <p class="contact-card__info-title">PHONE</p>
          <a
            href="tel:+001166996644"
            class="contact-card__info-phone link"
            aria-label="link to number +001166996644"
            title="link to number"
            >+00 11 66 99 66 44</a
          >
          <a
            href="tel:11996644065"
            class="contact-card__info-phone link"
            aria-label="link to number 11 99 66 44 065"
            title="link to number"
            >11 99 66 44 065</a
          >
        </div>
      </div>
      <!-- / -->
    </div>
  </div>
</section>
