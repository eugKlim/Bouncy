<section class="contactform" id="contactform">
  <div class="container">
    <form class="contactform-form">
      <div class="contactform-form__info">
        <input
          title="entry field name"
          type="text"
          placeholder="Your name"
          class="contactform-name"
          aria-label="enter your name"
        />
        <input
          title="entry field email"
          type="email"
          placeholder="Email address"
          class="contactform-email"
          aria-label="enter your email"
        />
        <input
          title="entry field subject"
          type="text"
          placeholder="Subject"
          class="contactform-subject"
          aria-label="entry field subject"
        />
      </div>
      <div class="contactform-form__message">
        <textarea
          placeholder="Message"
          title="entry field message"
          aria-label="entry field message"
        ></textarea>
      </div>
      <button
        title="submit entry field"
        type="submit"
        class="contactform-submit"
        aria-label="submit entry field"
      >
        SUBMIT NOW
      </button>
    </form>
  </div>
</section>
