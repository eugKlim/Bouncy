<section class="contactform" id="contactform">
  <div class="container">
    <form class="contactform-form">
      <div class="contactform-form__info">
        <input title="entry field name" type="text" placeholder="Your name" class="contactform-name" />
        <input title="entry field email"
          type="email"
          placeholder="Email address"
          class="contactform-email"
        />
        <input title="entry field subject" type="text" placeholder="Subject" class="contactform-subject" />
      </div>
      <div class="contactform-form__message">
        <textarea placeholder="Message" title="entry field message"></textarea>
      </div>
      <button title="submit entry field" type="submit" class="contactform-submit">SUBMIT NOW</button>
    </form>
  </div>
</section>
