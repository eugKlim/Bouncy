<section class="contactform" id="contactform">
  <div class="container">
    <form class="contactform-form">
      <div class="contactform-form__info">
        <input type="text" placeholder="Your name" class="contactform-name" />
        <input
          type="email"
          placeholder="Email address"
          class="contactform-email"
        />
        <input type="text" placeholder="Subject" class="contactform-subject" />
      </div>
      <div class="contactform-form__message">
        <textarea placeholder="Message"></textarea>
      </div>
      <button type="submit" class="contactform-submit">SUBMIT NOW</button>
    </form>
  </div>
</section>
